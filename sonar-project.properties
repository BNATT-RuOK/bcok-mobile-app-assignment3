# ── Định danh dự án ──────────────────────────────────────────────────────────
sonar.projectKey=BNATT-RuOK_bcok-mobile-app-assignment3
sonar.organization=bnatt-ruok
sonar.projectName=RuOK Mobile App
sonar.projectVersion=1.0.0

# ── Nguồn mã nguồn ───────────────────────────────────────────────────────────
sonar.sources=app
sonar.tests=__tests__ 

# Loại bỏ các file rác để tăng % coverage thực tế
sonar.exclusions=**/node_modules/**, **/coverage/**, **/*.d.ts, **/assets/**
sonar.test.inclusions=**/__tests__/**/*.test.tsx, **/__tests__/**/*.test.ts

# ── Báo cáo coverage ─────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# CHỈ loại trừ những file layout không thể test, ĐỪNG loại trừ (tabs)
sonar.coverage.exclusions=\
  app/**/_layout.tsx,\
  app/**/+not-found.tsx,\
  app/**/index.tsx,\
  app/**/sos-detail.tsx,\
  app/**/contacts.tsx,\
  app/**/history.tsx,\
  app/**/profile.tsx